name: Deploy GitHub Pages

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out production main
        uses: actions/checkout@v5
        with:
          ref: main
          path: main-src

      - name: Check out dev preview
        uses: actions/checkout@v5
        with:
          ref: dev
          path: dev-src

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            main-src/package-lock.json
            dev-src/package-lock.json

      - name: Build production root from main
        working-directory: main-src
        run: |
          npm install --include=optional --no-audit --no-fund
          npm run lint
          rm -rf ../site
          npm run build -- --base="/${{ github.event.repository.name }}/" --outDir="../site"

      - name: Build dev preview from dev
        working-directory: dev-src
        run: |
          npm install --include=optional --no-audit --no-fund
          npm run lint
          rm -rf ../site/dev
          npm run build -- --base="/${{ github.event.repository.name }}/dev/" --outDir="../site/dev"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
