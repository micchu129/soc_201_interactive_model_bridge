<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1900" viewBox="0 0 1440 1900">
  <style>
    text { font-family: Inter, Arial, sans-serif; fill: #edf5fa; }
    .frame { fill: #050810; stroke: #405163; stroke-width: 2; }
    .panel { fill: #111a28; stroke: #405163; stroke-width: 2; }
    .soft { fill: #ffffff0b; stroke: #405163; }
    .muted { fill: #9fb2bf; }
    .accent { fill: #7ed9ed; }
    .gold { fill: #f3cc55; }
    .label { fill: #7ed9ed; font-size: 14px; letter-spacing: 3px; }
    .title { font-size: 28px; }
    .body { fill: #b8c7d0; font-size: 15px; }
    .small { fill: #9fb2bf; font-size: 12px; }
  </style>
  <rect width="1440" height="1900" fill="#02050a"/>

  <g id="Desktop_Micro_Tutorial">
    <rect class="frame" x="0" y="0" width="1440" height="900"/>
    <text class="label" x="20" y="28">DESKTOP / MICRO / TUTORIAL STEP 15 OF 32</text>
    <text x="20" y="54" font-size="18">SIMARC / MODEL BRIDGE</text>
    <rect class="gold" x="235" y="37" width="48" height="22" rx="11"/><text x="246" y="53" fill="#231b05" font-size="10">BETA</text>
    <text x="1385" y="54" font-size="24">&#9881;</text>

    <g id="Time_Control_Stack">
      <rect class="panel" x="16" y="72" width="500" height="70" rx="18"/>
      <text x="32" y="113" font-size="25">Day 001</text>
      <path d="M150 84V130" stroke="#405163"/>
      <text class="body" x="174" y="113">Saturday  &#183;  Day Time  &#183;  Week 1</text>
      <rect class="panel" x="16" y="152" width="500" height="66" rx="18"/>
      <text x="32" y="193" font-size="25">06:00</text>
      <path d="M150 164V206" stroke="#405163"/>
      <text x="175" y="193" font-size="18">&#10074;&#10074;   &#9654;   4&#215;   16&#215;   64&#215;   128&#215;</text>
      <rect class="panel" x="16" y="228" width="205" height="54" rx="14"/>
      <text x="35" y="262" font-size="17">&#9783; Agent Directory</text>
    </g>

    <g id="City_Canvas">
      <path d="M300 490 710 250 1110 490 710 730Z" fill="#101a27" stroke="#365062" stroke-width="3"/>
      <g fill="#273748" stroke="#0d1722" stroke-width="5"><path d="M390 440 800 680 860 645 450 405Z"/><path d="M560 335 970 575 1030 540 620 300Z"/></g>
      <g fill="#d9e1e6" stroke="#9aabb5" stroke-width="2"><rect x="500" y="420" width="95" height="115"/><rect x="690" y="350" width="105" height="150"/><rect x="890" y="470" width="95" height="110"/></g>
      <g fill="#e7ca70"><circle cx="726" cy="333" r="10"/><circle cx="750" cy="333" r="10"/><circle cx="726" cy="309" r="10"/><circle cx="750" cy="309" r="10"/></g>
      <circle cx="570" cy="590" r="10" fill="#e47768"/><path d="M570 600 555 630H585Z" fill="#e47768"/>
    </g>

    <g id="Camera_Presets">
      <rect class="panel" x="1325" y="270" width="95" height="370" rx="18"/>
      <text class="small" x="1372" y="300" text-anchor="middle">VIEWS</text>
      <text x="1372" y="350" text-anchor="middle" font-size="20">&#9671;</text><text class="small" x="1372" y="370" text-anchor="middle">Default</text>
      <text x="1372" y="435" text-anchor="middle" font-size="20">&#9645;</text><text class="small" x="1372" y="455" text-anchor="middle">Street</text>
      <text x="1372" y="520" text-anchor="middle" font-size="20">&#9638;</text><text class="small" x="1372" y="540" text-anchor="middle">Top</text>
      <text x="1372" y="605" text-anchor="middle" font-size="20">&#10021;</text><text class="small" x="1372" y="625" text-anchor="middle">Custom</text>
    </g>

    <g id="Tutorial_Two_Day_Status">
      <rect class="panel" x="455" y="570" width="530" height="245" rx="20"/>
      <text class="label" x="482" y="605">&#10021; MODEL TUTORIAL &#183; 15 / 32 &#183; MICRO</text>
      <text class="title" x="482" y="647">Two days at 128&#215;</text>
      <text class="body" x="482" y="676">Press 128&#215; to run two live days from the Default camera.</text>
      <rect x="482" y="698" width="475" height="58" rx="12" fill="#f3cc5510" stroke="#f3cc5570"/>
      <text x="500" y="721" fill="#e9d893" font-size="14">Two-day demonstration running</text>
      <text class="small" x="500" y="743">1 day 18 hours remaining. Restoration starts automatically.</text>
      <text class="body" x="500" y="786">Press 128&#215; and watch the restoration.</text>
      <text class="small" x="890" y="794">Skip tutorial</text>
    </g>

    <rect class="panel" x="515" y="836" width="410" height="48" rx="24"/>
    <rect class="accent" x="526" y="843" width="120" height="34" rx="17"/>
    <text x="550" y="867" fill="#07111b" font-size="15">MICRO</text><text x="690" y="867" font-size="15">MESO</text><text x="820" y="867" font-size="15">MACRO</text>
    <circle class="panel" cx="1390" cy="850" r="24"/><text x="1385" y="858" font-size="20">?</text>
  </g>

  <g id="Desktop_Macro_Settings" transform="translate(0 950)">
    <rect class="frame" width="1440" height="900"/>
    <text class="label" x="20" y="28">DESKTOP / MACRO POLICY LAB / SETTINGS</text>
    <text x="20" y="54" font-size="18">SIMARC / MODEL BRIDGE</text>
    <text x="1385" y="54" font-size="24">&#9881;</text>

    <g id="Macro_Console">
      <rect x="0" y="68" width="548" height="832" fill="#0c1521" stroke="#314252" stroke-width="2"/>
      <rect class="panel" x="16" y="86" width="516" height="64" rx="16"/>
      <text x="32" y="124" font-size="22">Day 001</text><text class="body" x="180" y="124">Saturday &#183; Day Time &#183; Week 1</text>
      <rect class="panel" x="16" y="160" width="516" height="58" rx="16"/>
      <text x="32" y="196" font-size="22">06:00</text><text x="180" y="196" font-size="16">&#10074;&#10074; &#9654; 4&#215; 16&#215; 64&#215; 128&#215;</text>
      <text class="label" x="28" y="258">MACRO / POLICY LAB</text><text class="title" x="28" y="296">Apply an intervention</text>
      <g class="body"><text x="28" y="335">alcohol Price</text><text x="470" y="335">7</text><text x="28" y="385">venue Regulation</text><text x="470" y="385">50</text><text x="28" y="435">treatment Access</text><text x="470" y="435">50</text><text x="28" y="485">prevention</text><text x="470" y="485">50</text></g>
      <g stroke="#7ed9ed" stroke-width="5"><path d="M28 350H505"/><path d="M28 400H505"/><path d="M28 450H505"/><path d="M28 500H505"/></g>
      <rect class="accent" x="28" y="525" width="477" height="45" rx="11"/><text x="228" y="553" fill="#07111b" font-size="15">Apply policy</text>
      <g class="soft"><rect x="28" y="590" width="148" height="65" rx="10"/><rect x="192" y="590" width="148" height="65" rx="10"/><rect x="356" y="590" width="148" height="65" rx="10"/></g>
      <text class="small" x="28" y="690">24 hours       7 days       30 days</text>
      <rect class="panel" x="28" y="710" width="477" height="125" rx="14"/><text class="small" x="45" y="737">ALCOHOL CONSUMPTION &#183; TWO-HOUR INTERVALS</text><polyline points="45,815 110,795 175,805 240,760 305,780 370,745 490,770" fill="none" stroke="#7ed9ed" stroke-width="4"/>
    </g>

    <g id="Macro_City">
      <path d="M650 470 980 275 1305 470 980 665Z" fill="#101a27" stroke="#365062" stroke-width="3"/>
      <g fill="#d9e1e6"><rect x="785" y="415" width="75" height="75"/><rect x="1000" y="365" width="75" height="75"/><rect x="1105" y="505" width="75" height="75"/></g>
      <g fill="#e7ca70"><circle cx="800" cy="400" r="4"/><circle cx="812" cy="400" r="4"/><circle cx="1020" cy="350" r="4"/><circle cx="1032" cy="350" r="4"/></g>
    </g>

    <g id="Settings_Panel">
      <rect class="panel" x="1100" y="80" width="315" height="530" rx="18"/>
      <text class="title" x="1125" y="120">Model settings</text><text x="1380" y="120" font-size="20">&#215;</text>
      <rect class="soft" x="1125" y="145" width="265" height="75" rx="12"/>
      <text class="body" x="1142" y="174">Interface size</text><text x="1315" y="174" font-size="15">Default</text>
      <path d="M1142 200H1370" stroke="#7ed9ed" stroke-width="5"/><circle cx="1256" cy="200" r="9" class="accent"/>
      <g class="soft"><rect x="1125" y="235" width="265" height="44" rx="10"/><rect x="1125" y="290" width="265" height="44" rx="10"/><rect x="1125" y="345" width="265" height="44" rx="10"/><rect x="1125" y="400" width="265" height="44" rx="10"/></g>
      <text class="body" x="1142" y="263">Start guided tutorial</text><text class="body" x="1142" y="318">Restart simulation</text><text class="body" x="1142" y="373">Regenerate population</text><text x="1142" y="428" fill="#ff9eaa" font-size="15">Reset everything</text>
      <text class="body" x="1125" y="480">About this beta</text><text class="small" x="1125" y="510">Bridge v0.3.0-beta.8</text><text class="small" x="1125" y="532">SimARC 2.2 &#183; NetLogo 7.0.3</text>
    </g>

    <rect class="panel" x="515" y="836" width="410" height="48" rx="24"/>
    <rect class="accent" x="794" y="843" width="120" height="34" rx="17"/>
    <text x="550" y="867" font-size="15">MICRO</text><text x="690" y="867" font-size="15">MESO</text><text x="820" y="867" fill="#07111b" font-size="15">MACRO</text>
  </g>
</svg>
