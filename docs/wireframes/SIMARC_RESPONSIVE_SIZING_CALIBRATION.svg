      <rect fill="#0c1521" stroke="#52687a" stroke-width="2" width="390" height="768"/>
      <text x="18" y="30" font-size="13">SIMARC / MODEL BRIDGE</text>
      <rect class="panel" x="14" y="48" width="362" height="45" rx="11"/><text class="body" x="28" y="76">Day 001 &#183; Saturday &#183; Week 1</text>
      <rect class="panel" x="14" y="101" width="362" height="43" rx="11"/><text class="body" x="28" y="128">06:00  &#10074;&#10074;  &#9654;  4&#215;  16&#215;  64&#215;  128&#215;</text>
      <text class="label" x="20" y="178" font-size="11">MACRO / POLICY LAB</text><text class="title" x="20" y="210">Apply an intervention</text>
      <g class="body"><text x="20" y="247">Alcohol price</text><text x="20" y="295">Venue regulation</text><text x="20" y="343">Treatment access</text><text x="20" y="391">Prevention</text></g>
      <g stroke="#7ed9ed" stroke-width="4"><path d="M20 260H370"/><path d="M20 308H370"/><path d="M20 356H370"/><path d="M20 404H370"/></g>
      <rect class="accent" x="20" y="430" width="350" height="38" rx="9"/><text x="156" y="455" fill="#07111b" font-size="13">Apply policy</text>
      <g class="soft"><rect x="20" y="485" width="106" height="52" rx="8"/><rect x="140" y="485" width="106" height="52" rx="8"/><rect x="260" y="485" width="106" height="52" rx="8"/></g>
      <rect class="panel" x="20" y="575" width="346" height="120" rx="10"/>
      <rect class="guide" x="410" y="115" width="390" height="505" rx="24"/><text class="note" x="480" y="145">CITY CANVAS RESERVED</text><path class="canvas" d="M475 390 610 310 745 390 610 470Z"/>
      <rect class="panel" x="730" y="48" width="278" height="570" rx="14"/><text class="title" x="750" y="82">Model settings</text><circle class="soft" cx="982" cy="72" r="14"/>
      <text class="small" x="750" y="112">INTERFACE SIZE</text><rect class="soft" x="750" y="128" width="238" height="44" rx="22"/><rect class="accent" x="829" y="134" width="78" height="32" rx="16"/><text class="small" x="766" y="156">COMPACT</text><text x="846" y="156" fill="#07111b" font-size="11">DEFAULT</text><text class="small" x="926" y="156">LARGE</text>
      <g class="soft"><rect x="750" y="192" width="238" height="40" rx="8"/><rect x="750" y="242" width="238" height="40" rx="8"/><rect x="750" y="292" width="238" height="40" rx="8"/><rect x="750" y="342" width="238" height="40" rx="8"/></g>
      <text class="body" x="765" y="217">Start guided tutorial</text><text class="body" x="765" y="267">Restart simulation</text><text class="body" x="765" y="317">Regenerate population</text><text class="danger" x="765" y="367" font-size="14">Reset everything</text>
      <text class="small" x="750" y="430">About this beta</text><text class="small" x="750" y="454">Bridge v0.3.0-beta.8</text>
    </g>
  </g>

