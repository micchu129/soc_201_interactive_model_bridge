        <text class="small" x="973" y="243" text-anchor="middle">VIEWS</text>
        <g class="body" text-anchor="middle"><text x="973" y="292">&#9671;</text><text x="973" y="310">Default</text><text x="973" y="360">&#9645;</text><text x="973" y="378">Street</text><text x="973" y="428">&#9638;</text><text x="973" y="446">Top</text><text x="973" y="496">&#10021;</text></g>
