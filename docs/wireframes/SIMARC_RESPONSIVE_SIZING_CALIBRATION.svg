  <!-- Interface size token comparison -->
  <text class="section" x="70" y="1985">Interface-size token comparison</text>
  <text class="body" x="70" y="2018">These settings alter density inside components, not the application shell or fixed panel widths.</text>

  <g id="Compact_Tokens" transform="translate(70 2070)">
    <rect class="panel" width="620" height="450" rx="20"/>
    <text class="label" x="28" y="42">COMPACT</text><text class="small" x="28" y="68">For additional canvas space on laptops</text>
    <rect class="soft" x="28" y="95" width="564" height="50" rx="12"/><text x="48" y="126" font-size="16">Body text / supporting text / control height</text>
    <rect class="accent" x="28" y="170" width="170" height="38" rx="10"/><text x="73" y="195" fill="#07111b" font-size="13">Primary control</text>
    <rect class="soft" x="218" y="170" width="150" height="38" rx="10"/><text class="body" x="257" y="195">Secondary</text>
    <rect class="soft" x="28" y="235" width="564" height="155" rx="14"/><text class="small" x="48" y="267">PANEL PADDING / SMALL GAPS / HEADING</text><text x="48" y="310" font-size="21">Compact panel heading</text><text class="body" x="48" y="345">Readable without proportionally enlarging the panel.</text>
    <text class="note" x="28" y="425">Proposed: 14px body, 34px control, 12px panel padding</text>
  </g>

  <g id="Default_Tokens" transform="translate(790 2070)">
    <rect class="panel" width="620" height="450" rx="20"/>
    <text class="label" x="28" y="42">DEFAULT</text><text class="small" x="28" y="68">Usable with no saved browser settings</text>
    <rect class="soft" x="28" y="95" width="564" height="54" rx="12"/><text x="48" y="128" font-size="17">Body text / supporting text / control height</text>
    <rect class="accent" x="28" y="174" width="180" height="42" rx="10"/><text x="72" y="201" fill="#07111b" font-size="14">Primary control</text>
    <rect class="soft" x="228" y="174" width="158" height="42" rx="10"/><text x="266" y="201" font-size="14">Secondary</text>
    <rect class="soft" x="28" y="245" width="564" height="160" rx="14"/><text class="small" x="48" y="278">PANEL PADDING / STANDARD GAPS / HEADING</text><text x="48" y="323" font-size="24">Default panel heading</text><text class="body" x="48" y="360">The baseline density for desktop and laptop layouts.</text>
    <text class="note" x="28" y="435">Proposed: 16px body, 40px control, 16px panel padding</text>
  </g>

  <g id="Large_Tokens" transform="translate(1510 2070)">
    <rect class="panel" width="620" height="450" rx="20"/>
    <text class="label" x="28" y="42">LARGE</text><text class="small" x="28" y="68">Improves readability while preserving panel width</text>
    <rect class="soft" x="28" y="95" width="564" height="60" rx="12"/><text x="48" y="132" font-size="18">Body text / supporting text / control height</text>
    <rect class="accent" x="28" y="180" width="190" height="46" rx="10"/><text x="70" y="209" fill="#07111b" font-size="15">Primary control</text>
    <rect class="soft" x="238" y="180" width="166" height="46" rx="10"/><text x="276" y="209" font-size="15">Secondary</text>
    <rect class="soft" x="28" y="255" width="564" height="168" rx="14"/><text class="small" x="48" y="290">PANEL PADDING / STANDARD GAPS / HEADING</text><text x="48" y="338" font-size="27">Large panel heading</text><text x="48" y="377" font-size="16">Larger content, with internal scroll when required.</text>
    <text class="note" x="28" y="455">Proposed: 18px body, 46px control, 20px panel padding</text>
  </g>

  <g id="Approval_Notes" transform="translate(70 2620)">
    <rect class="soft" width="2060" height="170" rx="18"/>
    <text class="label" x="28" y="40">MANUAL CALIBRATION QUESTIONS</text>
    <text class="body" x="28" y="76">1. Is the 1024 laptop canvas clearance sufficient with the tutorial visible?</text>
    <text class="body" x="28" y="106">2. Should the Macro console be narrower or wider at any viewport?</text>
    <text class="body" x="28" y="136">3. Are Compact / Default / Large density steps distinct enough without making Large dominate the viewport?</text>
  </g>
</svg>
