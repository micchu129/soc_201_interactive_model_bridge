      <rect class="panel" x="650" y="735" width="620" height="230" rx="20"/><text class="label" x="680" y="770" font-size="12">MODEL TUTORIAL &#183; 15 / 32 &#183; MICRO</text><text class="title" x="680" y="812">Two days at 128&#215;</text><text class="body" x="680" y="844">Panel width is bounded; extra viewport space remains available to the canvas.</text><rect class="soft" x="680" y="866" width="560" height="48" rx="10"/><text class="small" x="698" y="895">Two-day demonstration running</text>
