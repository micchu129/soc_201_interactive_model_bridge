      <text x="18" y="32" font-size="14">SIMARC / MODEL BRIDGE</text><rect class="panel" x="16" y="52" width="468" height="50" rx="12"/><text class="body" x="32" y="83">Day 001 &#183; Saturday &#183; Day Time &#183; Week 1</text><rect class="panel" x="16" y="110" width="468" height="48" rx="12"/><text class="body" x="32" y="140">06:00  &#10074;&#10074;  &#9654;  4&#215;  16&#215;  64&#215;  128&#215;</text>
      <text class="label" x="24" y="198" font-size="11">MACRO / POLICY LAB</text><text class="title" x="24" y="232">Apply an intervention</text><g stroke="#7ed9ed" stroke-width="4"><path d="M24 282H476"/><path d="M24 338H476"/><path d="M24 394H476"/><path d="M24 450H476"/></g><rect class="accent" x="24" y="478" width="452" height="42" rx="10"/><g class="soft"><rect x="24" y="545" width="138" height="60" rx="9"/><rect x="181" y="545" width="138" height="60" rx="9"/><rect x="338" y="545" width="138" height="60" rx="9"/></g><rect class="panel" x="24" y="655" width="452" height="155" rx="12"/>
