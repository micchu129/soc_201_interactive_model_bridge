<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="2860" viewBox="0 0 2200 2860">
  <style>
    text { font-family: Inter, Arial, sans-serif; fill: #edf5fa; }
    .page { fill: #02050a; }
    .frame { fill: #050810; stroke: #405163; stroke-width: 2; }
    .panel { fill: #111a28; stroke: #52687a; stroke-width: 2; }
    .soft { fill: #ffffff0b; stroke: #405163; stroke-width: 1.5; }
    .canvas { fill: #09121d; stroke: #365062; stroke-width: 2; }
    .accent { fill: #7ed9ed; }
    .gold { fill: #f3cc55; }
    .muted { fill: #9fb2bf; }
    .danger { fill: #ff9eaa; }
    .label { fill: #7ed9ed; font-size: 16px; font-weight: 700; letter-spacing: 3px; }
    .section { font-size: 30px; font-weight: 600; }
    .title { font-size: 24px; }
    .body { fill: #b8c7d0; font-size: 14px; }
    .small { fill: #9fb2bf; font-size: 11px; }
    .note { fill: #e9d893; font-size: 13px; }
    .guide { fill: none; stroke: #f3cc55; stroke-width: 2; stroke-dasharray: 7 6; }
    .rule { stroke: #405163; stroke-width: 2; }
  </style>
  <rect class="page" width="2200" height="2860"/>

  <text class="label" x="70" y="65">SIMARC / RESPONSIVE SIZING CALIBRATION / V0.3.0-BETA.6</text>
  <text class="section" x="70" y="110">Approve spatial balance before implementation</text>
  <text class="body" x="70" y="145">Yellow dashed regions are reserved canvas or collision-clearance areas. Frames are drawn at 50% scale.</text>
  <text class="note" x="70" y="175">Proposed rule: interface-size preferences change typography, control height, padding, and gaps; panel widths remain viewport-responsive and bounded.</text>

  <!-- 1024 x 768 Micro / Tutorial -->
