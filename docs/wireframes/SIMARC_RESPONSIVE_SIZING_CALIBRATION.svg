      <rect class="panel" x="1105" y="70" width="310" height="560" rx="16"/><text class="title" x="1130" y="108">Model settings</text><text class="small" x="1130" y="144">INTERFACE SIZE</text><rect class="soft" x="1130" y="160" width="260" height="46" rx="23"/><rect class="accent" x="1217" y="167" width="84" height="32" rx="16"/><text class="small" x="1144" y="188">COMPACT</text><text x="1235" y="188" fill="#07111b" font-size="11">DEFAULT</text><text class="small" x="1322" y="188">LARGE</text><g class="soft"><rect x="1130" y="230" width="260" height="42" rx="8"/><rect x="1130" y="282" width="260" height="42" rx="8"/><rect x="1130" y="334" width="260" height="42" rx="8"/><rect x="1130" y="386" width="260" height="42" rx="8"/></g><text class="small" x="1130" y="476">Bridge v0.3.0-beta.8</text>
