        <text class="title" x="284" y="570">Two days at 128&#215;</text>
        <text class="body" x="284" y="598">Press 128&#215; to run two live days from the Default camera.</text>
        <rect class="soft" x="284" y="616" width="456" height="42" rx="8"/>
        <text class="small" x="298" y="641">Two-day demonstration running &#183; 1 day 18 hours remaining</text>
        <text class="small" x="676" y="681">Skip tutorial</text>
      </g>

      <rect class="panel" x="362" y="712" width="300" height="40" rx="20"/><rect class="accent" x="368" y="718" width="92" height="28" rx="14"/>
      <text class="body" x="393" y="738" fill="#07111b">MICRO</text><text class="body" x="487" y="738">MESO</text><text class="body" x="577" y="738">MACRO</text>
      <circle class="panel" cx="990" cy="730" r="18"/><text x="986" y="736" font-size="14">?</text>
    </g>
  </g>

