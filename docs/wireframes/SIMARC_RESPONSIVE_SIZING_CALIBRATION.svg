      <rect class="panel" x="1340" y="260" width="80" height="350" rx="16"/><text class="small" x="1380" y="288" text-anchor="middle">VIEWS</text><g class="body" text-anchor="middle"><text x="1380" y="350">Default</text><text x="1380" y="425">Street</text><text x="1380" y="500">Top</text><text x="1380" y="575">Custom</text></g>
      <rect class="panel" x="455" y="600" width="530" height="210" rx="18"/><text class="label" x="480" y="632" font-size="11">MODEL TUTORIAL &#183; 15 / 32 &#183; MICRO</text><text class="title" x="480" y="670">Two days at 128&#215;</text><text class="body" x="480" y="698">Controls stay readable without dominating the city canvas.</text><rect class="soft" x="480" y="716" width="480" height="45" rx="9"/><text class="small" x="496" y="744">Two-day demonstration running</text>
