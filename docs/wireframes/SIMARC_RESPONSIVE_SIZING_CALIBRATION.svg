  <!-- Macro / Settings viewport comparisons -->
  <text class="section" x="70" y="1345">Macro console and Settings balance</text>
  <text class="body" x="70" y="1378">Console width is bounded and does not scale with interface-size preference. Settings remains internally scrollable.</text>

