      <text x="20" y="34" font-size="14">SIMARC / MODEL BRIDGE</text><circle class="panel" cx="1405" cy="28" r="18"/>
      <rect class="panel" x="16" y="58" width="470" height="54" rx="13"/><text x="32" y="91" font-size="20">Day 001</text><path class="rule" d="M135 68V102"/><text class="body" x="154" y="91">Saturday &#183; Day Time &#183; Week 1</text>
      <rect class="panel" x="16" y="120" width="470" height="52" rx="13"/><text x="32" y="153" font-size="20">06:00</text><path class="rule" d="M135 130V162"/><text class="body" x="154" y="153">&#10074;&#10074;  &#9654;  4&#215;  16&#215;  64&#215;  128&#215;</text>
